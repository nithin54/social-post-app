services:
  - type: web
    name: social-post-app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REQUIRE_MONGODB
        value: "false"
    buildFilter:
      paths:
        - backend/**
        - render.yaml
